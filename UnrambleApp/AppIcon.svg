<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- macOS squircle clip path (continuous curvature superellipse) -->
    <clipPath id="squircle">
      <path d="
        M 512 0
        C 776 0, 880 0, 944 16
        C 976 28, 996 48, 1008 80
        C 1024 144, 1024 248, 1024 512
        C 1024 776, 1024 880, 1008 944
        C 996 976, 976 996, 944 1008
        C 880 1024, 776 1024, 512 1024
        C 248 1024, 144 1024, 80 1008
        C 48 996, 28 976, 16 944
        C 0 880, 0 776, 0 512
        C 0 248, 0 144, 16 80
        C 28 48, 48 28, 80 16
        C 144 0, 248 0, 512 0
        Z
      "/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#eeeceb"/>

    <!-- 6-bar waveform, centered at (512, 512) -->
    <!-- Bars spaced 88px apart, group width = 5*88 = 440 -->
    <!-- First bar at 512 - 220 = 292, last at 512 + 220 = 732 -->
    <!-- Heights derived from onboarding SVG (24-unit viewBox) -->
    <g stroke="#292929" stroke-width="52" stroke-linecap="round" fill="none">
      <!-- Bar 1: y 9-15 in 24 → height 25% of 600 = 150, centered at 512 -->
      <line x1="292" y1="437" x2="292" y2="587"/>
      <!-- Bar 2: y 6-18 in 24 → height 50% of 600 = 300 -->
      <line x1="380" y1="362" x2="380" y2="662"/>
      <!-- Bar 3: y 3-21 in 24 → height 75% of 600 = 450 -->
      <line x1="468" y1="287" x2="468" y2="737"/>
      <!-- Bar 4: y 7-17 in 24 → height 42% of 600 = 250 -->
      <line x1="556" y1="387" x2="556" y2="637"/>
      <!-- Bar 5: y 5-19 in 24 → height 58% of 600 = 350 -->
      <line x1="644" y1="337" x2="644" y2="687"/>
      <!-- Bar 6: y 8-16 in 24 → height 33% of 600 = 200 -->
      <line x1="732" y1="412" x2="732" y2="612"/>
    </g>
  </g>
</svg>
