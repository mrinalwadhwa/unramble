name: Test Unramble

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
      TEST_LOG_DIR: ${{ runner.temp }}/unramble-test-runs
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Report Swift toolchain
        run: swift --version

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Check the test runner
        run: make test-runner-tests

      - name: Check the test suite inventory
        run: make test-inventory

      - name: Run bounded clean package selection
        run: make test-ci

      - name: Run slow timeout baseline
        run: make test-slow

      - name: Run host and OS adapter suites
        run: make test-os

      - name: Print full test logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "$TEST_LOG_DIR" ]]; then
            printf 'No test log directory was created.\n'
            exit 0
          fi

          found=0
          while IFS= read -r log; do
            found=1
            printf '::group::%s\n' "$log"
            cat "$log"
            printf '::endgroup::\n'
          done < <(find "$TEST_LOG_DIR" -type f -name swift-test.log -print | sort)

          if (( found == 0 )); then
            printf 'No Swift test logs were created.\n'
          fi
