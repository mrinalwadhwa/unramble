name: Test Unramble

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
      TEST_LOG_DIR: ${{ github.workspace }}/unramble-test-runs
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Report Swift toolchain
        run: swift --version

      - name: Generate polish scenario data
        run: make test-data

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Check the test runner
        run: make test-runner-tests

      - name: Check the test suite inventory
        run: make test-inventory

      - name: Run bounded clean package selection
        run: make test-ci

      - name: Run host and OS adapter suites
        run: make test-os

      - name: Print full test logs
        if: always()
        run: scripts/print-test-logs.sh
