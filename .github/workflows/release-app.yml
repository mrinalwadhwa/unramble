name: Release Unramble App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Package tests run in tests.yml, not as a release gate.
  build-and-release:
    runs-on: macos-26
    environment: release
    permissions:
      contents: write
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Materialize and verify model pack
        run: make models

      - name: Determine version and tag
        id: meta
        run: |
          VERSION=$(make version)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: scripts/ci-import-cert.sh

      - name: Archive release build
        run: make archive KEYCHAIN="$KEYCHAIN_PATH"

      - name: Sign app bundle
        run: make sign KEYCHAIN="$KEYCHAIN_PATH"

      - name: Create DMG
        run: make dmg

      - name: Set up notarization credentials
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: scripts/ci-store-notary-credentials.sh

      - name: Notarize DMG
        run: make notarize

      - name: Generate appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          make appcast DOWNLOAD_URL="https://github.com/mrinalwadhwa/unramble/releases/download/${TAG}/"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/ci-publish-release.sh "${{ steps.meta.outputs.tag }}"

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && security list-keychains | grep -q "$KEYCHAIN_PATH"; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
