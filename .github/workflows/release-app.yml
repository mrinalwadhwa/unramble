name: Release Unramble App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
      TEST_LOG_DIR: ${{ runner.temp }}/unramble-test-runs
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Report Swift toolchain
        run: swift --version

      - name: Run tests
        run: make test-ci

      - name: Print full test logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "$TEST_LOG_DIR" ]]; then
            printf 'No test log directory was created.\n'
            exit 0
          fi

          found=0
          while IFS= read -r log; do
            found=1
            printf '::group::%s\n' "$log"
            cat "$log"
            printf '::endgroup::\n'
          done < <(find "$TEST_LOG_DIR" -type f -name swift-test.log -print | sort)

          if (( found == 0 )); then
            printf 'No Swift test logs were created.\n'
          fi

  build-and-release:
    needs: test
    runs-on: macos-26
    environment: release
    permissions:
      contents: write
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Materialize and verify model pack
        run: make models

      - name: Determine version and tag
        id: meta
        run: |
          VERSION=$(make version)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$DEVELOPER_ID_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Archive release build
        run: make archive KEYCHAIN="$KEYCHAIN_PATH"

      - name: Sign app bundle
        run: make sign KEYCHAIN="$KEYCHAIN_PATH"

      - name: Create DMG
        run: make dmg

      - name: Set up notarization credentials
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/api-key.p8"
          echo "$APPLE_API_KEY" | base64 --decode > "$API_KEY_PATH"

          xcrun notarytool store-credentials "unramble-notarize" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID"

          rm -f "$API_KEY_PATH"

      - name: Notarize DMG
        run: make notarize

      - name: Generate appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          make appcast DOWNLOAD_URL="https://github.com/mrinalwadhwa/unramble/releases/download/${TAG}/"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-rc.* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "Unramble ${TAG#v}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            releases/Unramble.dmg \
            releases/appcast.xml

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && security list-keychains | grep -q "$KEYCHAIN_PATH"; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
