# LoRA fine-tuning settings for the on-device dictation polish model.
# Fine-tunes Qwen3 0.6B on the paired examples (train.jsonl / valid.jsonl)
# in this folder.
model: mlx-community/Qwen3-0.6B-4bit
data: .
train: true
fine_tune_type: lora
mask_prompt: true
batch_size: 4
iters: 200
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 50
val_batches: -1
save_every: 50
adapter_path: adapters
max_seq_length: 512
seed: 42

# LoRA parameters: rank 8, alpha 16 (mlx-lm defaults).
