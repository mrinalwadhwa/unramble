name: FreeFlow
options:
  bundleIdPrefix: computer.autonomy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: true
      CODE_SIGN_IDENTITY: "Developer ID Application"
      DEVELOPMENT_TEAM: "3A56YKKGA5"
      CODE_SIGN_STYLE: Manual
      OTHER_CODE_SIGN_FLAGS: "--timestamp"

packages:
  FreeFlowKit:
    path: FreeFlowKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0

targets:
  FreeFlowApp:
    type: application
    platform: macOS
    sources:
      - path: FreeFlowApp/Sources
      - path: FreeFlowApp/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: FreeFlow
        PRODUCT_BUNDLE_IDENTIFIER: computer.autonomy.freeflow
        INFOPLIST_FILE: FreeFlowApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: FreeFlowApp/FreeFlow.entitlements
        ENABLE_APP_SANDBOX: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - package: FreeFlowKit
      - package: Sparkle
    entitlements:
      path: FreeFlowApp/FreeFlow.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
