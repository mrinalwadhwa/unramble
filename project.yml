name: Unramble
options:
  bundleIdPrefix: computer.unramble
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: true
      CODE_SIGN_IDENTITY: "Developer ID Application"
      DEVELOPMENT_TEAM: "U5Y82TZF5K"
      CODE_SIGN_STYLE: Manual
      OTHER_CODE_SIGN_FLAGS: "--timestamp"

packages:
  UnrambleKit:
    path: UnrambleKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0

targets:
  UnrambleApp:
    type: application
    platform: macOS
    sources:
      - path: UnrambleApp/Sources
      - path: UnrambleApp/Resources
        buildPhase: resources
        excludes:
          - "models/**"
      - path: UnrambleApp/Resources/models
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_NAME: Unramble
        PRODUCT_BUNDLE_IDENTIFIER: computer.unramble
        INFOPLIST_FILE: UnrambleApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: UnrambleApp/Unramble.entitlements
        ENABLE_APP_SANDBOX: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - package: UnrambleKit
      - package: Sparkle
    entitlements:
      path: UnrambleApp/Unramble.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
